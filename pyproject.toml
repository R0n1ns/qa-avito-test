[tool.ruff]
target-version = "py312"
line-length = 150
exclude = [
  ".venv",
  "__pycache__",
  "allure-results",
  "allure-report"
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "PT"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
